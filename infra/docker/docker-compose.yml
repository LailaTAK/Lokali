version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: lokali-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USER:-lokali}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lokali_secret}
      POSTGRES_DB: ${DB_NAME:-lokali_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lokali-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redisdata-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: lokali-backend-dev
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://${DB_USER:-lokali}:${DB_PASSWORD:-lokali_secret}@postgres:5432/${DB_NAME:-lokali_db}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-jwt_secret_lokali_key_2026_dev_env}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-jwt_refresh_secret_lokali_key_2026_dev_env}
      - JWT_EXPIRES_IN=1h
      - JWT_REFRESH_EXPIRES_IN=7d
      - CORS_ORIGINS=*
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  adminer:
    image: adminer:latest
    container_name: lokali-adminer-dev
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata-dev:
  redisdata-dev:
