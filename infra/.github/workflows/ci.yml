name: Continuous Integration

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: lokali_test
        ports:
          - 5432:5432
        # Ensure postgres is healthy before running tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: backend

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend

      - name: Lint Verification
        run: npm run lint
        working-directory: backend

      - name: Run Tests with Coverage
        run: npm run test -- --coverage
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:password@localhost:5432/lokali_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret_value_lokali_key
          JWT_REFRESH_SECRET: test_jwt_refresh_secret_value_lokali_key

      - name: Compile TypeScript
        run: npm run build
        working-directory: backend

  test-mobile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package.json

      # Install dependencies in mobile directory. We skip preparing native builds for check-only runs.
      - name: Install Dependencies
        run: npm install
        working-directory: mobile

      - name: TypeScript Type Check
        run: npm run ts:check
        working-directory: mobile
