name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./infra/docker/Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/lokali-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/lokali-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Navigate to application repository directory on server
            cd /opt/lokali

            # Sync infrastructure configs (docker-compose files and nginx setup)
            git pull origin main

            # Login to retrieve new images
            docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

            # Pull target updated production containers
            docker-compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.prod.yml pull backend

            # Perform database prisma schema updates
            docker-compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.prod.yml run --rm backend npx prisma migrate deploy

            # Re-launch production container stacks
            docker-compose -f infra/docker/docker-compose.yml -f infra/docker/docker-compose.prod.yml up -d --build

            # Cleanup orphan/dangling system cache items
            docker system prune -f
