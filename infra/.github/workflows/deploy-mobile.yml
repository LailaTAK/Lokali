name: Deploy Mobile

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-submit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package.json

      - name: Install Dependencies
        run: npm install
        working-directory: mobile

      - name: Setup Expo CLI & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Trigger production EAS cloud build and submit to App Store / Play Store
      - name: EAS Build and Submit
        run: |
          eas build --platform all --profile production --non-interactive --auto-submit
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
